name = "nnbot"
main = ".output/server/index.mjs"
compatibility_date = "2024-11-01"

# Required: Nitro/Nuxt server code relies on Node built-ins.
# Without this, imports resolve to Module namespaces and the Worker crashes at
# startup with "Class extends value [object Module] is not a constructor".
compatibility_flags = ["nodejs_compat"]

# Static client assets (built to .output/public)
[assets]
directory = ".output/public"
binding = "ASSETS"

# Persistent storage. Workers have no filesystem, so the JSON "database"
# (bot / groups / schedules / logs / moderation) lives in KV.
# Create it once with:  npx wrangler kv namespace create DATA
# then paste the returned id below.
[[kv_namespaces]]
binding = "DATA"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"

# Runs the "broadcast" Nitro task every minute (replaces node-cron).
[triggers]
crons = ["* * * * *"]

[observability]
enabled = true
